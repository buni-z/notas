<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Minhas Notas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      width: 860px;
      min-height: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }

    .left {
      background: #e8d5c4;
      width: 340px;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }

    .left h1 {
      font-size: 32px;
      font-weight: 700;
      color: #3d2c1e;
    }

    .left p {
      font-size: 15px;
      color: #7a5c45;
      line-height: 1.6;
    }

    .pills {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pill {
      background: white;
      border-radius: 50px;
      padding: 10px 18px;
      font-size: 13px;
      color: #3d2c1e;
      display: flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
    }

    .pill span {
      font-size: 16px;
    }

    .right {
      flex: 1;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
    }

    .right h2 {
      font-size: 22px;
      font-weight: 600;
      color: #3d2c1e;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: #f5f0eb;
      border-radius: 50px;
      padding: 4px;
      width: fit-content;
    }

    .tab {
      padding: 8px 24px;
      border-radius: 50px;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #7a5c45;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: white;
      color: #3d2c1e;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form input {
      padding: 14px 18px;
      border: 1.5px solid #e8d5c4;
      border-radius: 14px;
      font-size: 14px;
      color: #3d2c1e;
      background: #faf8f6;
      outline: none;
      transition: border 0.2s;
    }

    .form input:focus {
      border-color: #c9956e;
    }

    .form input::placeholder {
      color: #b8a090;
    }

    .btn-primary {
      padding: 14px;
      background: #c9956e;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: #b8845d;
    }

    .error {
      color: #e24b4a;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="left">
    <h1>Minhas Notas</h1>
    <p>Organize suas tarefas, atividades e compromissos. </p>
    <div class="pills">
      <div class="pill"><span>☑</span> Checklists</div>
      <div class="pill"><span>◎</span> Calendário</div>
    </div>
  </div>

  <div class="right">
    <h2>Bem-vindo! 𐔌՞ ܸ.ˬ.ܸ՞𐦯 </h2>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Entrar</button>
      <button class="tab" onclick="showTab('register')">Criar conta</button>
    </div>

    <div id="form-login" class="form">
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Senha" />
      <p class="error" id="login-error"></p>
      <button class="btn-primary" onclick="login()">Entrar</button>
    </div>

    <div id="form-register" class="form" style="display:none">
      <input type="text" id="register-name" placeholder="Nome" />
      <input type="email" id="register-email" placeholder="Email" />
      <input type="password" id="register-password" placeholder="Senha" />
      <p class="error" id="register-error"></p>
      <button class="btn-primary" onclick="register()">Criar conta</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://notas-f7ue.onrender.com/'

  function showTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none'
    document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none'
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1))
    })
  }

  async function login() {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value
    const error = document.getElementById('login-error')

    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })

    const data = await res.json()

    if (!res.ok) {
      error.textContent = data.error
      error.style.display = 'block'
      return
    }

    localStorage.setItem('token', data.token)
    window.location.href = 'app.html'
  }

  async function register() {
    const name = document.getElementById('register-name').value
    const email = document.getElementById('register-email').value
    const password = document.getElementById('register-password').value
    const error = document.getElementById('register-error')

    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    })

    const data = await res.json()

    if (!res.ok) {
      error.textContent = data.error
      error.style.display = 'block'
      return
    }

    showTab('login')
  }
</script>

</body>
</html>
